<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L’Oréal Beauty Consultant</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="loreal-header">
        <div class="loreal-header__logo">L’Oréal</div>
    </header>
    <div class="chat-container">
        <main class="loreal-chat">
            <div class="loreal-chat__query-monitor" id="query-monitor">
                <span class="loreal-chat__query-label">CURRENT CONSULTATION:</span>
                <span class="loreal-chat__query-text" id="last-user-query">Waiting for your question...</span>
            </div>

            <section class="loreal-chat__history" id="chat-window">
            </section>

            <div class="loreal-chat__input-area">
                <div class="loreal-chat__input-box">
                    <input type="text" class="loreal-chat__input" id="user-input" placeholder="Ask about L'Oréal products...">
                    <button class="loreal-chat__submit" id="send-btn">SEND</button>
                </div>
            </div>
        </main>
    </div>
    <footer class="site-footer">© 2026 Vednt Patel — All Rights Reserved.</footer>
    <script src="js/script.js"></script>
</body>
</html></content>
